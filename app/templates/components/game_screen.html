<div id="game-container">
<div class="game-screen">
    <header class="game-header">
        <button
            hx-post="/reset"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="btn-back">
            ← Back
        </button>
        <span class="game-header-logo">Soc <span>Ops</span></span>
        <div class="w-16"></div>
    </header>

    <p class="game-hint">Tap a square when you find a match</p>

    {% if session.has_bingo %}
    <div class="bingo-banner">
        ★ Bingo — you got a line!
    </div>
    {% endif %}

    <div class="board-wrapper">
        {% include "components/bingo_board.html" %}
    </div>
</div>

{% if session.show_bingo_modal %}
    {% include "components/bingo_modal.html" %}
{% endif %}
</div>
