<div id="game-container">
<div class="landing-bg flex flex-col items-center justify-center min-h-full p-6">
    <!-- Decorative scanlines overlay -->
    <div class="scanlines" aria-hidden="true"></div>

    <div class="text-center landing-content">

        <!-- Hero title -->
        <div class="mb-6 hero-reveal">
            <div class="landing-badge mb-4">⬡ SOCIAL NETWORKING GAME ⬡</div>
            <h1 class="landing-title">SOC<span class="title-accent">OPS</span></h1>
            <p class="landing-subtitle">SOCIAL BINGO</p>
        </div>

        <!-- Decorative mini bingo grid -->
        <div class="mini-grid mb-6 grid-reveal" aria-hidden="true">
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell free">FREE</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
            <div class="mini-cell">?</div>
            <div class="mini-cell marked">★</div>
        </div>

        <!-- How to play -->
        <div class="landing-card mb-6 card-reveal">
            <h2 class="landing-card-title">// HOW TO PLAY</h2>
            <ul class="landing-steps">
                <li><span class="step-num">01</span> Find people who match the questions</li>
                <li><span class="step-num">02</span> Tap a square when you find a match</li>
                <li><span class="step-num">03</span> Get 5 in a row to win!</li>
            </ul>
        </div>

        <!-- CTA button -->
        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="landing-btn btn-reveal">
            <span class="btn-text">PLAY NOW</span>
            <span class="btn-glow" aria-hidden="true"></span>
        </button>

    </div>
</div>
</div>
